<!DOCTYPE html>
<html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Create Listing</title><link rel="stylesheet" href="css/style.css"></head>
<body>
<nav><a href="index.html">Home</a><a href="listings.html">Listings</a><a href="seller-dashboard.html">Seller</a><a href="buyer-dashboard.html">Buyer</a><a href="create-listing.html">Create Listing</a></nav>

<div class="container">
    <input placeholder='Image Upload Placeholder'>
    <form>

        <label>Product Images</label>

        <img src="images/plasticimage1.png" alt="Plastic Image" width="300">

        <img src="images/metalimage1.jpg" alt="Metal Image" width="300">

        <select>
            <option>Material Type</option>
            <option>Plastic</option>
            <option>Metal</option>
            <option>Paper</option>
        </select>

        <select>
            <option>Quality</option>
            <option>High</option>
            <option>Medium</option>
            <option>Low</option>
        </select>

        <textarea placeholder="Description"></textarea>

        <input type="number" placeholder="Minimum Price">

        <input type="datetime-local">

        <input type="number" placeholder="Minimum Rating">

        <input type="number" placeholder="Maximum Distance (km)">

        <div class="placeholder">Map Placeholder</div>

        <button class="btn" type="submit">Publish Listing</button>

    </form>
</div>
<footer><p>Waste to Money © 2026</p></footer>
</body></html>
